<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>デス版MBTI — 死生観タイプ診断</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1115;
      --bg-elevated: #171a21;
      --border: #2a3040;
      --text: #e8eaef;
      --muted: #8b93a7;
      --accent: #c9a962;
      --accent-soft: rgba(201, 169, 98, 0.15);
      --yes: #4a7c6b;
      --yes-hover: #5d9481;
      --no: #6b5b7c;
      --no-hover: #806f92;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Zen Kaku Gothic New", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }

    .noise {
      pointer-events: none;
      position: fixed;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: clamp(1.25rem, 4vw, 2.5rem);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    h1 {
      font-family: "Shippori Mincho", serif;
      font-weight: 700;
      font-size: clamp(1.5rem, 5vw, 2rem);
      letter-spacing: 0.08em;
      margin: 0 0 0.35rem;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(1.25rem, 4vw, 1.75rem);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    .progress-wrap {
      margin-bottom: 1.25rem;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #e8d5a3);
      border-radius: 4px;
      transition: width 0.35s ease;
    }

    .axis-tag {
      display: inline-block;
      font-size: 0.72rem;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 0.2rem 0.55rem;
      border-radius: 6px;
      margin-bottom: 0.65rem;
      letter-spacing: 0.04em;
    }

    #question-text {
      font-family: "Shippori Mincho", serif;
      font-size: clamp(1.05rem, 3.2vw, 1.2rem);
      font-weight: 600;
      margin: 0 0 1.5rem;
      min-height: 4.5em;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    button.answer {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      padding: 1rem 1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button.answer:active {
      transform: scale(0.98);
    }

    button.answer-yes {
      background: var(--yes);
      color: #fff;
    }

    button.answer-yes:hover {
      background: var(--yes-hover);
    }

    button.answer-no {
      background: var(--no);
      color: #fff;
    }

    button.answer-no:hover {
      background: var(--no-hover);
    }

    .hint {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    /* Result */
    #screen-result {
      display: none;
    }

    #screen-result.visible {
      display: block;
      animation: fadeIn 0.5s ease;
    }

    #screen-quiz.hidden {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-code {
      font-family: "Shippori Mincho", serif;
      font-size: clamp(2rem, 8vw, 2.75rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-align: center;
      color: var(--accent);
      margin: 0.25rem 0 0.5rem;
    }

    .result-name {
      font-family: "Shippori Mincho", serif;
      font-size: clamp(1.1rem, 3.5vw, 1.35rem);
      text-align: center;
      margin: 0 0 1.25rem;
    }

    .result-section {
      margin-top: 1.1rem;
      padding-top: 1.1rem;
      border-top: 1px solid var(--border);
    }

    .result-section h3 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin: 0 0 0.4rem;
      font-weight: 700;
    }

    .result-section p {
      margin: 0;
      font-size: 0.92rem;
      color: var(--text);
    }

    .actions {
      margin-top: 1.75rem;
      display: flex;
      justify-content: center;
    }

    button.secondary {
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.65rem 1.4rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    button.secondary:hover {
      color: var(--text);
      border-color: var(--muted);
    }

    .disclaimer {
      margin-top: 2rem;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    #screen-intro {
      text-align: center;
    }

    #screen-intro p.lead {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0 0 1.5rem;
      text-align: left;
    }

    button.primary {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.9rem 2rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), #a88b4a);
      color: #1a1510;
      width: 100%;
      max-width: 280px;
    }

    button.primary:hover {
      filter: brightness(1.08);
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <main>
    <h1>デス版MBTI</h1>
    <p class="subtitle">死生観タイプ診断 · 全16問</p>

    <section id="screen-intro" class="card">
      <p class="lead">
        16の質問に「はい」「いいえ」で答えると、あなたの4文字タイプ（例：<strong>PASI</strong>）と解説が表示されます。娯楽・自己理解用のコンテンツであり、医療や法律の助言ではありません。
      </p>
      <button type="button" class="primary" id="btn-start">診断をはじめる</button>
    </section>

    <section id="screen-quiz" class="card hidden" aria-live="polite">
      <div class="progress-wrap">
        <div class="progress-meta">
          <span id="progress-label">質問 1 / 16</span>
          <span id="progress-pct">6%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 6.25%"></div>
        </div>
      </div>
      <span class="axis-tag" id="axis-tag">意識の方向 · P / L</span>
      <p id="question-text"></p>
      <div class="buttons">
        <button type="button" class="answer answer-yes" id="btn-yes">はい</button>
        <button type="button" class="answer answer-no" id="btn-no">いいえ</button>
      </div>
      <p class="hint">直感で答えてください。正解はありません。</p>
    </section>

    <section id="screen-result" class="card">
      <p class="subtitle" style="margin-bottom:0.5rem">あなたのタイプ</p>
      <p class="result-code" id="out-code">PASI</p>
      <p class="result-name" id="out-name"></p>

      <div class="result-section">
        <h3>概要</h3>
        <p id="out-summary"></p>
      </div>
      <div class="result-section">
        <h3>特徴</h3>
        <p id="out-traits"></p>
      </div>
      <div class="result-section">
        <h3>相性の良いタイプ</h3>
        <p id="out-compat"></p>
      </div>
      <div class="result-section">
        <h3>より良く生きるヒント</h3>
        <p id="out-hint"></p>
      </div>

      <div class="actions">
        <button type="button" class="secondary" id="btn-retry">もう一度診断する</button>
      </div>
    </section>

    <p class="disclaimer">
      本診断は「死生観」をテーマにした自己理解のためのコンテンツです。深刻な不安や体調の変化がある場合は、信頼できる医療・相談窓口をご利用ください。
    </p>
  </main>

  <script>

          summary: "コミュニティの未来のために死に抗い、関係性の中で変革を起こします。",
          traits: "運動、起業、教育改革など、仲間と走るタイプです。",
          compat: "LRMC（ビジョンと地盤が補完）、LACI（穏やかな継承者たちとの協奏）。",
          hint: "燃え尽き防止に「小さな勝ち」を週単位で定義しましょう。"
        },
        LRMC: {
          name: "未来へ繋ぐコミュニティの礎",
          summary: "死後の社会や共同体に実務的な基盤を残しつつ、死に抗うエネルギーも持ちます。",
          traits: "基金、NPO、自治の仕組みづくりなど、人と制度の両方に手を入れます。",
          compat: "LACM（設計思想が近い）、PRCI（現場の情熱と接続）。",
          hint: "英雄になりすぎず、後継者を育成する時間を意図的に確保しましょう。"
        }
      };

      const polePairs = {
        PL: ["P", "L"],
        AR: ["A", "R"],
        SM: ["S", "M"],
        IC: ["I", "C"]
      };

      /** @type {boolean[]} */
      let answers = [];
      let index = 0;

      const elIntro = document.getElementById("screen-intro");
      const elQuiz = document.getElementById("screen-quiz");
      const elResult = document.getElementById("screen-result");
      const elQuestion = document.getElementById("question-text");
      const elAxis = document.getElementById("axis-tag");
      const elProgressLabel = document.getElementById("progress-label");
      const elProgressPct = document.getElementById("progress-pct");
      const elProgressFill = document.getElementById("progress-fill");

      function scoreAxis(axisKey) {
        const subset = QUESTIONS.map((q, i) => ({ q, i })).filter((x) => x.q.axis === axisKey);
        const [left, right] = polePairs[axisKey];
        let leftScore = 0;
        let rightScore = 0;
        subset.forEach(({ q, i }) => {
          const yes = answers[i];
          if (yes === undefined) return;
          if (q.poleOnYes === left) {
            if (yes) leftScore++;
            else rightScore++;
          } else if (q.poleOnYes === right) {
            if (yes) rightScore++;
            else leftScore++;
          }
        });
        if (leftScore > rightScore) return left;
        if (rightScore > leftScore) return right;
        const tieBreaker = subset[0];
        const y = answers[tieBreaker.i];
        if (y === undefined) return left;
        return tieBreaker.q.poleOnYes === left ? (y ? left : right) : (y ? right : left);
      }

      function computeType() {
        const p = scoreAxis("PL");
        const a = scoreAxis("AR");
        const s = scoreAxis("SM");
        const ic = scoreAxis("IC");
        return p + a + s + ic;
      }

      function renderQuestion() {
        const q = QUESTIONS[index];
        elAxis.textContent = q.axisLabel;
        elQuestion.textContent = q.text;
        const n = index + 1;
        const pct = Math.round((n / QUESTIONS.length) * 100);
        elProgressLabel.textContent = "質問 " + n + " / " + QUESTIONS.length;
        elProgressPct.textContent = pct + "%";
        elProgressFill.style.width = (n / QUESTIONS.length) * 100 + "%";
      }

      function showQuiz() {
        elIntro.style.display = "none";
        elQuiz.classList.remove("hidden");
        elResult.classList.remove("visible");
      }

      function showResult(code) {
        elQuiz.classList.add("hidden");
        elResult.classList.add("visible");
        const info = TYPE_INFO[code];
        document.getElementById("out-code").textContent = code;
        document.getElementById("out-name").textContent = info.name;
        document.getElementById("out-summary").textContent = info.summary;
        document.getElementById("out-traits").textContent = info.traits;
        document.getElementById("out-compat").textContent = info.compat;
        document.getElementById("out-hint").textContent = info.hint;
      }

      function resetQuiz() {
        answers = [];
        index = 0;
        elResult.classList.remove("visible");
        elQuiz.classList.remove("hidden");
        renderQuestion();
      }

      function answer(yes) {
        answers[index] = yes;
        index++;
        if (index >= QUESTIONS.length) {
          const code = computeType();
          showResult(code);
        } else {
          renderQuestion();
        }
      }

      document.getElementById("btn-start").addEventListener("click", function () {
        answers = [];
        index = 0;
        showQuiz();
        renderQuestion();
      });

      document.getElementById("btn-yes").addEventListener("click", function () {
        answer(true);
      });

      document.getElementById("btn-no").addEventListener("click", function () {
        answer(false);
      });

      document.getElementById("btn-retry").addEventListener("click", function () {
        resetQuiz();
      });
    })();
  </script>
</body>
</html>
